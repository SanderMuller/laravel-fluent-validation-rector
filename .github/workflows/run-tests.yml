name: run-tests

permissions:
  contents: read

on:
  # No path filter on `push` — every commit to main must be
  # CI-validated so the pre-release green-light gate has evidence
  # for docs-only release commits (README updates, etc.). Path
  # filters stay on `pull_request` to skip CI cycles on docs-only
  # PRs.
  push:
  pull_request:
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - 'phpunit.xml.dist'
      - 'composer.json'
      - 'composer.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest]
        php: [8.4, 8.3]
        stability: [prefer-lowest, prefer-stable]
        laravel: ['11.*', '12.*', '13.*']
        include:
          - laravel: '11.*'
            testbench: '^9.0'
          - laravel: '12.*'
            testbench: '^10.11'
          - laravel: '13.*'
            testbench: '^11.0'

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - ${{ matrix.os }}

    env:
      CI_LARAVEL_MAJOR: ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Get composer cache directory
        id: composer-cache
        shell: bash
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ matrix.os }}-${{ matrix.php }}-${{ matrix.laravel }}-${{ matrix.stability }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ matrix.os }}-${{ matrix.php }}-${{ matrix.laravel }}-${{ matrix.stability }}-
            composer-${{ matrix.os }}-${{ matrix.php }}-${{ matrix.laravel }}-

      - name: Pin Laravel + testbench versions
        run: composer require --dev "orchestra/testbench:${{ matrix.testbench }}" --no-update --no-interaction

      - name: Install dependencies
        run: composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: List Installed Dependencies
        run: composer show -D

      # Linux: `pest --parallel` is safe and ~halves test time.
      # Windows: stay serial — `pest --parallel` has a documented FS
      # race in `PackageManifest::write()` → `rename()` on
      # `prefer-lowest` (1.17.1 incident).
      - name: Execute tests (Linux, parallel)
        if: runner.os == 'Linux'
        run: vendor/bin/pest --ci --parallel

      - name: Execute tests (Windows, serial)
        if: runner.os == 'Windows'
        run: vendor/bin/pest --ci
